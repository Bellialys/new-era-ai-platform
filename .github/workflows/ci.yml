name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Typecheck, lint, test, build, docs, smoke
    runs-on: ubuntu-latest

    # Non-secret placeholders so the build's prebuild env-check (basic) passes in
    # CI. These are NOT secrets: the build does not call Supabase/OpenRouter, and
    # API routes are dynamic. Real values live only in Vercel / local .env.local.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
      SUPABASE_SERVICE_ROLE_KEY: sb_secret_placeholder
      OPENROUTER_API_KEY: sk-or-v1-placeholder
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test --if-present

      - name: Environment checker tests
        run: npm run test:env-check

      - name: Build
        run: npm run build

      - name: Project state and docs sync check
        run: |
          npm run state:check
          npm run docs:check

      - name: Smoke
        env:
          ALLOW_DEGRADED: "1"
          SMOKE_BASE_URL: http://127.0.0.1:3000
        run: |
          npm run start > /tmp/new-era-next.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl -sS http://127.0.0.1:3000/api/health > /tmp/new-era-health.json; then
              break
            fi
            sleep 2
          done

          npm run smoke
